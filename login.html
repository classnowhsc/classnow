<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ClassNow</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
<canvas id="particles"></canvas>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo" style="text-decoration:none;">
      <img src="logo-nav.png" class="nav-logo-img" alt="ClassNow" />
      <span class="brand">Class<span class="accent">Now</span></span>
    </a>
    <div class="nav-auth" style="margin-left:auto;">
      <a href="index.html" class="btn-ghost" style="text-decoration:none;">← Home</a>
      <a href="signup.html" class="btn-primary-sm">Sign Up</a>
    </div>
    <button class="hamburger" id="hamburger">&#9776;</button>
  </div>
  <div class="mobile-menu hidden" id="mobileMenu">
    <a href="index.html">🏠 Home</a>
    <a href="signup.html" class="mob-signup">Sign Up Free</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-bg-glow"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <img src="logo.png" class="auth-logo-img" alt="ClassNow Logo" />
      <div class="brand" style="font-size:1.6rem;">Class<span class="accent">Now</span></div>
    </div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Login to access your courses and continue learning.</p>
    <div class="form-error" id="loginError"></div>
    <div class="form-success" id="loginSuccess"></div>
    <div class="form-group">
      <label for="loginEmail">Email Address</label>
      <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" autocomplete="email" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="email"/>
    </div>
    <div class="form-group">
      <label for="loginPassword">Password</label>
      <div style="position:relative;">
        <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" autocomplete="current-password" style="padding-right:52px;"/>
        <button type="button" id="togglePwd" aria-label="Show/hide password"
          style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:1.1rem;padding:4px;transition:color 0.2s;">
          👁
        </button>
      </div>
    </div>
    <button type="button" class="btn-submit" id="loginBtn">Login to ClassNow</button>
    <div class="divider"><div class="divider-line"></div><span class="divider-text">OR</span><div class="divider-line"></div></div>
    <p class="auth-switch">Don't have an account? <a href="signup.html">Create one free →</a></p>
    <p style="text-align:center;margin-top:12px;font-family:var(--font-text);font-size:0.82rem;">
      <a href="#" id="resetLink" style="color:var(--text3);text-decoration:underline;">Can't login? Reset your account</a>
    </p>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initFirebase();
  initParticles();
  initHamburger();

  if (Auth.getSession()) { window.location.href = 'classes.html'; return; }

  // ── Show/hide password toggle ──
  const pwdInput  = document.getElementById('loginPassword');
  const toggleBtn = document.getElementById('togglePwd');
  toggleBtn.addEventListener('click', () => {
    const show = pwdInput.type === 'password';
    pwdInput.type = show ? 'text' : 'password';
    toggleBtn.textContent = show ? '🙈' : '👁';
    pwdInput.focus();
  });

  // ── Scroll input into view on mobile keyboard open ──
  document.querySelectorAll('.form-input').forEach(input => {
    input.addEventListener('focus', () => {
      setTimeout(() => input.scrollIntoView({ behavior: 'smooth', block: 'center' }), 320);
    }, { passive: true });
  });

  // ── Show warning banner if no accounts exist in this browser ──
  const storedUsers = JSON.parse(localStorage.getItem('cn_users') || '{}');
  if (Object.keys(storedUsers).length === 0) {
    const sub = document.querySelector('.auth-sub');
    if (sub) sub.innerHTML =
      'Login to access your courses.<br>' +
      '<span style="color:#f59e0b;font-size:0.82rem;">⚠️ No accounts found in this browser — ' +
      '<a href="signup.html" style="color:#f59e0b;font-weight:700;text-decoration:underline;">Sign up first →</a></span>';
  }

  // ── "Can't login?" self-service reset ──
  document.getElementById('resetLink').addEventListener('click', e => {
    e.preventDefault();
    const emailVal = document.getElementById('loginEmail').value.trim().toLowerCase();
    if (!emailVal) {
      alert('Enter your email address first, then click "Can't login?" to reset it.');
      document.getElementById('loginEmail').focus();
      return;
    }
    const users = JSON.parse(localStorage.getItem('cn_users') || '{}');
    if (!users[emailVal]) {
      alert('No account found for ' + emailVal + ' in this browser.

Please sign up first.');
      return;
    }
    const confirmed = confirm(
      'Reset account for ' + emailVal + '?

' +
      'This will delete the stored account so you can sign up again with a new password.

' +
      'Press OK to confirm.'
    );
    if (confirmed) {
      delete users[emailVal];
      localStorage.setItem('cn_users', JSON.stringify(users));
      alert('Account removed. You can now sign up again with a new password.');
      window.location.href = 'signup.html';
    }
  });

  // ── Login function ──
  async function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl    = document.getElementById('loginError');
    const sucEl    = document.getElementById('loginSuccess');
    const btn      = document.getElementById('loginBtn');

    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    if (!email || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block';
      errEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Logging in…';

    const loginTimeout = setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Login to ClassNow';
      errEl.textContent = 'Connection timed out. Please check your internet and try again.';
      errEl.style.display = 'block';
    }, 12000);

    try {
      const result = await Auth.login(email, password);
      clearTimeout(loginTimeout);
      if (result.ok) {
        sucEl.textContent = 'Welcome back, ' + result.user.name + '! Redirecting…';
        sucEl.style.display = 'block';
        btn.textContent = '✓ Success';
        setTimeout(() => { window.location.href = 'classes.html'; }, 900);
      } else {
        // Give specific error — distinguish "no account" from "wrong password"
        const users = JSON.parse(localStorage.getItem('cn_users') || '{}');
        const key   = email.toLowerCase();
        if (!users[key]) {
          errEl.innerHTML =
            '⚠️ No account found for <b>' + email + '</b> in this browser.<br>' +
            '<small>Did you sign up on a different device? ' +
            '<a href="signup.html" style="color:#ff8080;">Sign up again here →</a></small>';
        } else {
          errEl.innerHTML =
            '❌ Wrong password for <b>' + email + '</b>.<br>' +
            '<small>Use the 👁 button to check what you're typing, or ' +
            '<a href="#" id="resetInline" style="color:#ff8080;">reset your account</a>.</small>';
          setTimeout(() => {
            document.getElementById('resetInline')?.addEventListener('click', e => {
              e.preventDefault();
              document.getElementById('resetLink').click();
            });
          }, 100);
        }
        errEl.style.display = 'block';
        errEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        btn.disabled = false;
        btn.textContent = 'Login to ClassNow';
      }
    } catch(e) {
      clearTimeout(loginTimeout);
      errEl.textContent = (e.name === 'TypeError' && e.message.includes('fetch'))
        ? 'No internet connection. Please try again.'
        : 'Error: ' + e.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Login to ClassNow';
    }
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doLogin(); }
  });
  document.getElementById('loginEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('loginPassword').focus(); }
  });
});
</script>
</body>
</html>
