<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — ClassNow</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
  <!-- Firebase Core -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<!-- Firebase Authentication -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- Firebase Realtime Database -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Your Main JS -->
<script src="app.js"></script>
<body>
<canvas id="particles"></canvas>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo" style="text-decoration:none;">
      <img src="logo-nav.png" class="nav-logo-img" alt="ClassNow" />
      <span class="brand">Class<span class="accent">Now</span></span>
    </a>
    <div class="nav-auth" style="margin-left:auto;">
      <a href="index.html" class="btn-ghost" style="text-decoration:none;">← Home</a>
      <a href="login.html" class="btn-primary-sm">Login</a>
    </div>
    <button class="hamburger" id="hamburger">&#9776;</button>
  </div>
  <div class="mobile-menu hidden" id="mobileMenu">
    <a href="index.html">🏠 Home</a>
    <a href="login.html" class="mob-login">Login</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-bg-glow"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <img src="logo.png" class="auth-logo-img" alt="ClassNow Logo" />
      <div class="brand" style="font-size:1.6rem;">Class<span class="accent">Now</span></div>
    </div>
    <h2 class="auth-title">Create Your Account</h2>
    <p class="auth-sub">Join thousands of HSC students learning smarter with ClassNow.</p>
    <div class="form-error" id="signupError"></div>
    <div class="form-success" id="signupSuccess"></div>
    <div class="form-group">
      <label for="signupName">Full Name</label>
      <input type="text" id="signupName" class="form-input" placeholder="Your full name" autocomplete="name" autocapitalize="words" spellcheck="false"/>
    </div>
    <div class="form-group">
      <label for="signupEmail">Email Address</label>
      <input type="email" id="signupEmail" class="form-input" placeholder="you@example.com" autocomplete="email" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="email"/>
    </div>
    <div class="form-group">
      <label for="signupPassword">Password</label>
      <div style="position:relative;">
        <input type="password" id="signupPassword" class="form-input" placeholder="Min. 6 characters" autocomplete="new-password" style="padding-right:52px;"/>
        <button type="button" id="togglePwd1" aria-label="Show/hide password"
          style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:1.1rem;padding:4px;line-height:1;">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label for="signupConfirm">Confirm Password</label>
      <div style="position:relative;">
        <input type="password" id="signupConfirm" class="form-input" placeholder="Re-enter password" autocomplete="new-password" style="padding-right:52px;"/>
        <button type="button" id="togglePwd2" aria-label="Show/hide confirm password"
          style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:1.1rem;padding:4px;line-height:1;">👁</button>
      </div>
    </div>
    <button type="button" class="btn-submit" id="signupBtn">Create Free Account</button>
    <div class="divider"><div class="divider-line"></div><span class="divider-text">OR</span><div class="divider-line"></div></div>
    <p class="auth-switch">Already have an account? <a href="login.html">Login →</a></p>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initFirebase();
  initParticles();
  initHamburger();

  if (Auth.getSession()) { window.location.href = 'classes.html'; return; }

  // Scroll focused input into view above mobile keyboard
  document.querySelectorAll('.form-input').forEach(input => {
    input.addEventListener('focus', () => {
      setTimeout(() => input.scrollIntoView({ behavior: 'smooth', block: 'center' }), 320);
    }, { passive: true });
  });

  async function doSignup() {
    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm  = document.getElementById('signupConfirm').value;
    const errEl    = document.getElementById('signupError');
    const sucEl    = document.getElementById('signupSuccess');
    const btn      = document.getElementById('signupBtn');

    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    const showErr = msg => {
      errEl.textContent = msg;
      errEl.style.display = 'block';
      errEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    };

    if (!name || !email || !password || !confirm) { showErr('Please fill in all fields.'); return; }
    if (password.length < 6) { showErr('Password must be at least 6 characters.'); return; }
    if (password !== confirm) { showErr('Passwords do not match.'); return; }
    if (!/\S+@\S+\.\S+/.test(email)) { showErr('Please enter a valid email.'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    const signupTimeout = setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Create Free Account';
      showErr('Connection timed out. Please check your internet and try again.');
    }, 12000);

    try {
      const result = await Auth.register(name, email, password);
      clearTimeout(signupTimeout);
      if (result.ok) {
        sucEl.textContent = 'Account created! Welcome, ' + name + '! Redirecting…';
        sucEl.style.display = 'block';
        btn.textContent = '✓ Success';
        setTimeout(() => { window.location.href = 'classes.html'; }, 900);
      } else {
        showErr(result.msg);
        btn.disabled = false;
        btn.textContent = 'Create Free Account';
      }
    } catch(e) {
      clearTimeout(signupTimeout);
      const msg = (e.name === 'TypeError' && e.message.includes('fetch'))
        ? 'No internet connection. Please try again.'
        : 'Error: ' + e.message;
      showErr(msg);
      btn.disabled = false;
      btn.textContent = 'Create Free Account';
    }
  }

  // Show/hide password toggles
  [['togglePwd1','signupPassword'],['togglePwd2','signupConfirm']].forEach(([btnId, inputId]) => {
    document.getElementById(btnId).addEventListener('click', () => {
      const inp = document.getElementById(inputId);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      document.getElementById(btnId).textContent = show ? '🙈' : '👁';
      inp.focus();
    });
  });

  document.getElementById('signupBtn').addEventListener('click', doSignup);

  // Enter key: advance through fields, submit on last
  const fields = ['signupName', 'signupEmail', 'signupPassword', 'signupConfirm'];
  fields.forEach((id, idx) => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (idx < fields.length - 1) {
          document.getElementById(fields[idx + 1]).focus();
        } else {
          doSignup();
        }
      }
    });
  });
});
</script>
</body>
</html>
