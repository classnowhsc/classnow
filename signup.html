<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — ClassNow</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<canvas id="particles"></canvas>

<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <div class="nav-logo">
      <img src="logo-nav.png" class="nav-logo-img" alt="ClassNow" />
      <span class="brand">Class<span class="accent">Now</span></span>
    </div>
    <div style="margin-left:auto;">
      <a href="index.html" class="btn-ghost" style="text-decoration:none;">← Back to Home</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-bg-glow"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <img src="logo.png" class="auth-logo-img" alt="ClassNow Logo" />
      <div class="brand" style="font-size:1.6rem;">Class<span class="accent">Now</span></div>
    </div>

    <h2 class="auth-title">Create Your Account</h2>
    <p class="auth-sub">Join thousands of HSC students learning smarter with ClassNow.</p>

    <div class="form-error" id="signupError"></div>
    <div class="form-success" id="signupSuccess"></div>

    <div class="form-group">
      <label for="signupName">Full Name</label>
      <input type="text" id="signupName" class="form-input" placeholder="Your full name" autocomplete="name"/>
    </div>

    <div class="form-group">
      <label for="signupEmail">Email Address</label>
      <input type="email" id="signupEmail" class="form-input" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="signupPassword">Password</label>
      <input type="password" id="signupPassword" class="form-input" placeholder="Min. 6 characters" autocomplete="new-password"/>
    </div>

    <div class="form-group">
      <label for="signupConfirm">Confirm Password</label>
      <input type="password" id="signupConfirm" class="form-input" placeholder="Re-enter password" autocomplete="new-password"/>
    </div>

    <button class="btn-submit" id="signupBtn" onclick="doSignup()">Create Free Account</button>

    <div class="divider"><div class="divider-line"></div><span class="divider-text">OR</span><div class="divider-line"></div></div>

    <p class="auth-switch">
      Already have an account? <a href="login.html">Login →</a>
    </p>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'classes.html';

  function doSignup() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirm').value;
    const errEl = document.getElementById('signupError');
    const sucEl = document.getElementById('signupSuccess');
    const btn = document.getElementById('signupBtn');

    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    if (!name || !email || !password || !confirm) {
      errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return;
    }
    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return;
    }
    if (!/\S+@\S+\.\S+/.test(email)) {
      errEl.textContent = 'Please enter a valid email.'; errEl.style.display = 'block'; return;
    }

    btn.disabled = true; btn.textContent = 'Creating account…';
    setTimeout(() => {
      const result = Auth.register(name, email, password);
      if (result.ok) {
        sucEl.textContent = `Account created! Welcome, ${name}! Redirecting…`;
        sucEl.style.display = 'block';
        setTimeout(() => { window.location.href = 'classes.html'; }, 1000);
      } else {
        errEl.textContent = result.msg; errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Create Free Account';
      }
    }, 600);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });
</script>
</body>
</html>
